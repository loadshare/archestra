name: Build MCP Server Base Docker Image

on:
  workflow_call:
    inputs:
      push_to_gcr:
        description: "Whether to push the built image to GCR"
        required: true
        type: boolean
      version:
        description: "Version tag for the Docker image"
        required: true
        type: string
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER:
        required: false
      GCP_SERVICE_ACCOUNT_NAME:
        required: false

env:
  IMAGE_REGISTRY: europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public
  IMAGE_NAME: mcp-server-base

jobs:
  python-mcp-lockfile-check:
    name: MCP Python Lockfile Check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: ./platform
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.9.26"

      - name: Regenerate lockfile and verify it is committed
        run: |
          make -C mcp_server_docker_image update-python-lockfile

          if ! git diff --exit-code -- mcp_server_docker_image/requirements.lock; then
            echo "::error::mcp_server_docker_image/requirements.lock is out of date. Regenerate it with uv pip compile."
            exit 1
          fi

  # Build on native runners for each architecture to avoid QEMU emulation issues
  # (Alpine's musl libc has known issues with QEMU emulation for ARM64)
  build-mcp-server-base-image:
    name: Build MCP Server Base Image (${{ matrix.os_and_arch }})
    runs-on: ${{ matrix.platform }}
    needs:
      - python-mcp-lockfile-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: blacksmith-16vcpu-ubuntu-2404
            os_and_arch: linux/amd64
          - platform: blacksmith-16vcpu-ubuntu-2404-arm
            os_and_arch: linux/arm64
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Authenticate to Google Artifact Registry
        if: inputs.push_to_gcr
        uses: ./.github/actions/auth-to-gar
        with:
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_NAME }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

      - name: Setup Blacksmith Builder
        uses: ./.github/actions/setup-blacksmith-builder

      - name: Build Docker image
        id: build
        uses: ./.github/actions/blacksmith-build-push
        with:
          context: ./platform/mcp_server_docker_image
          file: ./platform/mcp_server_docker_image/Dockerfile
          platforms: ${{ matrix.os_and_arch }}
          push: ${{ inputs.push_to_gcr }}
          outputs: type=image,name=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ inputs.push_to_gcr }}

      - name: Export digest
        if: inputs.push_to_gcr
        run: |
          mkdir -p /tmp/digests
          digest="${DIGEST}"
          touch "/tmp/digests/${digest#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        if: inputs.push_to_gcr
        uses: ./.github/actions/github-upload-artifact
        with:
          name: mcp-base-digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    name: Create multi-arch manifest
    if: inputs.push_to_gcr
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      - build-mcp-server-base-image
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Download digests
        uses: ./.github/actions/github-download-artifact
        with:
          path: /tmp/digests
          pattern: mcp-base-digests-*
          merge-multiple: true

      - name: Setup Blacksmith Builder
        uses: ./.github/actions/setup-blacksmith-builder

      - name: Authenticate to Google Artifact Registry
        uses: ./.github/actions/auth-to-gar
        with:
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_NAME }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_IDENTIFIER }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # supply-chain-policy: allow-latest internal release channel
          docker buildx imagetools create \
            -t "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}" \
            -t "${IMAGE_REGISTRY}/${IMAGE_NAME}:latest" \
            $(printf "${IMAGE_REGISTRY}/${IMAGE_NAME}@sha256:%s " *)
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ inputs.version }}

      - name: Inspect image
        run: |
          docker buildx imagetools inspect "${IMAGE_REGISTRY}/${IMAGE_NAME}:${VERSION}"
        env:
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ inputs.version }}
